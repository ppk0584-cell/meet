name: Deploy Fresh Meat Mall

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      PM2_APP: ${{ secrets.PM2_APP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          if [ -z "$SSH_PASSWORD" ]; then
            echo "SSH_PASSWORD secret이 필요합니다."
            exit 1
          fi
          echo "SSH password secret is configured."

      - name: Upload source to server
        run: |
          export SSHPASS="$SSH_PASSWORD"
          SSH_CMD=(sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes -o PreferredAuthentications=password -o PubkeyAuthentication=no)

          "${SSH_CMD[@]}" "$SSH_USER@$SSH_HOST" "echo SSH_OK && rm -rf /tmp/freshmatmall-release && mkdir -p /tmp/freshmatmall-release"

          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            -czf - . | "${SSH_CMD[@]}" "$SSH_USER@$SSH_HOST" "tar -xzf - -C /tmp/freshmatmall-release"

      - name: Install and restart on server
        run: |
          export SSHPASS="$SSH_PASSWORD"
          SSH_CMD=(sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes -o PreferredAuthentications=password -o PubkeyAuthentication=no)

          "${SSH_CMD[@]}" "$SSH_USER@$SSH_HOST" <<EOF
          set -e
          APP_DIR="$DEPLOY_PATH"
          RELEASE_DIR="/tmp/freshmatmall-release"
          PM2_APP="$PM2_APP"

          [ -f "$APP_DIR/.env" ] && cp "$APP_DIR/.env" /tmp/freshmatmall.env || true
          rm -rf /tmp/freshmatmall.git
          [ -d "$APP_DIR/.git" ] && cp -a "$APP_DIR/.git" /tmp/freshmatmall.git || true

          find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name node_modules -exec rm -rf {} +
          cp -a "$RELEASE_DIR"/. "$APP_DIR"/

          [ -f /tmp/freshmatmall.env ] && cp /tmp/freshmatmall.env "$APP_DIR/.env"
          [ -d /tmp/freshmatmall.git ] && cp -a /tmp/freshmatmall.git "$APP_DIR/.git"

          cd "$APP_DIR"
          npm ci --omit=dev
          pm2 restart "$PM2_APP" --update-env
          pm2 save

          curl -fsS https://freshmatmall.kr/ping
          EOF
