name: Deploy Fresh Meat Mall

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload source to server
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -rf /tmp/freshmatmall-release && mkdir -p /tmp/freshmatmall-release"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/freshmatmall-release/"

      - name: Install and restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" <<'EOF'
          set -e
          APP_DIR="${{ secrets.DEPLOY_PATH }}"
          RELEASE_DIR="/tmp/freshmatmall-release"
          PM2_APP="${{ secrets.PM2_APP }}"

          [ -f "$APP_DIR/.env" ] && cp "$APP_DIR/.env" /tmp/freshmatmall.env || true
          rm -rf /tmp/freshmatmall.git
          [ -d "$APP_DIR/.git" ] && cp -a "$APP_DIR/.git" /tmp/freshmatmall.git || true

          find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name node_modules -exec rm -rf {} +
          cp -a "$RELEASE_DIR"/. "$APP_DIR"/

          [ -f /tmp/freshmatmall.env ] && cp /tmp/freshmatmall.env "$APP_DIR/.env"
          [ -d /tmp/freshmatmall.git ] && cp -a /tmp/freshmatmall.git "$APP_DIR/.git"

          cd "$APP_DIR"
          npm ci --omit=dev
          pm2 restart "$PM2_APP" --update-env
          pm2 save

          curl -fsS https://freshmatmall.kr/ping
          EOF
