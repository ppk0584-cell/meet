name: Deploy Fresh Meat Mall

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      PM2_APP: ${{ secrets.PM2_APP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          if [ -n "$SSH_PASSWORD" ]; then
            echo "SSH_AUTH_MODE=password" >> "$GITHUB_ENV"
          elif [ -n "$SSH_PRIVATE_KEY" ]; then
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            echo "SSH_AUTH_MODE=key" >> "$GITHUB_ENV"
          else
            echo "SSH_PRIVATE_KEY 또는 SSH_PASSWORD secret 중 하나가 필요합니다."
            exit 1
          fi

      - name: Upload source to server
        run: |
          if [ "$SSH_AUTH_MODE" = "key" ]; then
            SSH_CMD=(ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=yes)
            RSYNC_SSH="ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=yes"
          else
            export SSHPASS="$SSH_PASSWORD"
            SSH_CMD=(sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes)
            RSYNC_SSH="sshpass -e ssh -p $SSH_PORT -o StrictHostKeyChecking=yes"
          fi

          "${SSH_CMD[@]}" "$SSH_USER@$SSH_HOST" "rm -rf /tmp/freshmatmall-release && mkdir -p /tmp/freshmatmall-release"

          rsync -az --delete \
            -e "$RSYNC_SSH" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./ "$SSH_USER@$SSH_HOST:/tmp/freshmatmall-release/"

      - name: Install and restart on server
        run: |
          if [ "$SSH_AUTH_MODE" = "key" ]; then
            SSH_CMD=(ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=yes)
          else
            export SSHPASS="$SSH_PASSWORD"
            SSH_CMD=(sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes)
          fi

          "${SSH_CMD[@]}" "$SSH_USER@$SSH_HOST" <<EOF
          set -e
          APP_DIR="$DEPLOY_PATH"
          RELEASE_DIR="/tmp/freshmatmall-release"
          PM2_APP="$PM2_APP"

          [ -f "$APP_DIR/.env" ] && cp "$APP_DIR/.env" /tmp/freshmatmall.env || true
          rm -rf /tmp/freshmatmall.git
          [ -d "$APP_DIR/.git" ] && cp -a "$APP_DIR/.git" /tmp/freshmatmall.git || true

          find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name node_modules -exec rm -rf {} +
          cp -a "$RELEASE_DIR"/. "$APP_DIR"/

          [ -f /tmp/freshmatmall.env ] && cp /tmp/freshmatmall.env "$APP_DIR/.env"
          [ -d /tmp/freshmatmall.git ] && cp -a /tmp/freshmatmall.git "$APP_DIR/.git"

          cd "$APP_DIR"
          npm ci --omit=dev
          pm2 restart "$PM2_APP" --update-env
          pm2 save

          curl -fsS https://freshmatmall.kr/ping
          EOF
